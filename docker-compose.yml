services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: finora-db
    restart: always
    environment:
      - POSTGRES_USER=finora
      - POSTGRES_PASSWORD=finora
      - POSTGRES_DB=finora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - finora-network

  redis:
    image: redis:7-alpine
    container_name: finora-redis
    restart: always
    networks:
      - finora-network

  minio:
    image: minio/minio
    container_name: finora-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=finora_admin
      - MINIO_ROOT_PASSWORD=finora_storage_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - finora-network

  backend:
    build: ./backend
    container_name: finora-backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - minio
    environment:
      - DATABASE_URL=postgresql://finora:finora@db:5432/finora
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=finora_admin
      - MINIO_SECRET_KEY=finora_storage_secret
    networks:
      - finora-network

  frontend:
    build: ./frontend
    container_name: finora-frontend
    restart: always
    command: sh -c "npm run build && npm run start"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=https://api.gestaofinora.com.br
    networks:
      - finora-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: finora-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - frontend
      - backend
    networks:
      - finora-network

networks:
  finora-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
